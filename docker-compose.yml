version: '3.8'

services:
  # 1. Database MySQL
  db:
    image: mysql:8.0
    container_name: ecommerce_db_container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword  # รหัสผ่าน Root
      MYSQL_DATABASE: ecommerce_db       # ชื่อ Database
      MYSQL_USER: user                   
      MYSQL_PASSWORD: password
    ports:
      - "5433:3306"                      # Port 5433 (localhost:5433)
    volumes:
      - db_data_mysql:/var/lib/mysql     # ปิด docker ข้อมูลไม่หาย

  # 2. phpMyAdmin (ตัวจัดการ Database ผ่านเว็บ)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_container
    restart: always
    links:
      - db
    environment:
      PMA_HOST: db                       # Database ชื่อ service "db"
      PMA_PORT: 3306
    ports:
      - "8080:80"                        # เข้าผ่าน localhost:8080

volumes:
  db_data_mysql: 